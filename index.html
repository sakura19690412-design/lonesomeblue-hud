<style>
:root{
  --hud-w:100vw;
  --hud-vh:1vh;
  --bat:34;
  --bat-r:255;
  --bat-g:176;
  --bat-b:0;
  --panel-bg:rgba(0,13,28,.48);
  --panel-border:rgba(42,155,255,.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;width:100vw;height:calc(var(--hud-vh)*100);min-height:calc(var(--hud-vh)*100);
  overflow:hidden;background:#02060c;color:#fff;font-family:Arial,Helvetica,system-ui,sans-serif;
  overscroll-behavior:none;touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
body{
  background:
    radial-gradient(circle at 50% 15%,rgba(44,158,255,.15),transparent 32%),
    radial-gradient(circle at 76% 80%,rgba(0,96,190,.14),transparent 44%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 6px),
    linear-gradient(90deg,#01050a 0%,#020712 52%,#01182f 100%);
}
.app{
  position:fixed;inset:0;width:var(--hud-w);height:calc(var(--hud-vh)*100);
  padding:clamp(8px,1.35vh,16px) clamp(10px,1.35vw,20px);
  display:grid;grid-template-columns:1fr;grid-template-rows:minmax(82px,22.5%) minmax(0,1fr);
  gap:clamp(8px,1.35vh,14px);overflow:hidden;contain:layout size style;
  border:1px solid rgba(25,125,255,.24);border-radius:18px;background:rgba(0,8,18,.08);
  box-shadow:inset 0 0 34px rgba(0,115,255,.08),0 0 18px rgba(0,115,255,.10);
}
.logoPanel,.clock,.box{
  position:relative;min-width:0;min-height:0;overflow:hidden;border-radius:22px;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  box-shadow:inset 0 0 28px rgba(0,125,255,.11),0 0 16px rgba(0,125,255,.14);
}
.logoPanel{background:rgba(0,9,20,.18);border-color:rgba(42,155,255,.18)}
.logoPanel:before,.logoPanel:after{display:none!important;content:none!important}
.logoWrap{position:absolute;left:50%;top:50%;width:min(78vw,760px);height:92%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);filter:drop-shadow(0 0 4px rgba(255,255,255,.7)) drop-shadow(0 0 18px rgba(105,190,255,.62))}
.logoWrap img{width:auto;height:100%;max-width:100%;max-height:100%;object-fit:contain;display:block;mix-blend-mode:normal;opacity:1}
.subLogo{display:none!important}
.right{display:grid;grid-template-columns:minmax(0,.92fr) minmax(0,1.28fr) minmax(0,1.05fr);grid-template-rows:minmax(0,1fr) minmax(0,1fr);gap:clamp(8px,1.35vh,14px) clamp(8px,1.25vw,16px);min-width:0;min-height:0}
.clock{grid-column:1;grid-row:1;display:flex;align-items:center;justify-content:center;font-size:clamp(46px,7.1vw,106px);font-weight:950;font-style:italic;line-height:1;letter-spacing:.02em;text-shadow:0 0 8px #fff,0 0 22px rgba(111,181,255,.95),0 0 48px rgba(0,102,255,.75);white-space:nowrap;padding:.08em .12em}
.dateBox{grid-column:1;grid-row:2;display:flex;align-items:center;justify-content:center}.date{font-size:clamp(23px,3.05vw,48px);font-weight:760;line-height:1.08;letter-spacing:.045em;opacity:.92;text-shadow:0 0 7px #fff,0 0 18px rgba(111,181,255,.74);white-space:nowrap}
.speedBox{grid-column:2;grid-row:1/span 2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(10px,1.9vh,20px) clamp(10px,1.5vw,20px);gap:.02em}.speedValue{font-size:clamp(72px,11.8vw,178px);font-weight:950;font-style:italic;line-height:.96;padding:.02em .08em 0;white-space:nowrap;text-shadow:0 0 8px #fff,0 0 26px rgba(111,181,255,.96),0 0 54px rgba(0,102,255,.85)}.speedUnit{font-size:clamp(16px,1.8vw,28px);font-weight:900;line-height:1.05;letter-spacing:.20em;color:rgba(240,250,255,.86);text-shadow:0 0 10px rgba(111,181,255,.9)}.distanceLine{font-size:clamp(15px,1.55vw,24px);font-weight:900;line-height:1.1;margin-top:.12em;letter-spacing:.10em;color:rgba(240,250,255,.88);text-shadow:0 0 8px #fff,0 0 18px rgba(111,181,255,.85);white-space:nowrap}.distanceLine span{font-style:italic;font-size:1.12em}.gpsStatus{position:absolute;top:clamp(8px,1.2vh,14px);right:clamp(10px,1vw,16px);font-size:clamp(10px,.92vw,14px);font-weight:800;letter-spacing:.14em;color:rgba(255,255,255,.50);z-index:4}
.batteryBox{grid-column:3;grid-row:1/span 2;display:flex;flex-direction:column;justify-content:center;padding:clamp(14px,2.2vh,24px) clamp(16px,2vw,28px);gap:clamp(8px,1.3vh,14px)}.enneHead{display:flex;align-items:center;justify-content:space-between;gap:1vw;min-width:0}.enneLabel{font-size:clamp(12px,1.15vw,18px);font-weight:950;letter-spacing:.13em;color:rgba(230,248,255,.82);text-shadow:0 0 12px rgba(24,168,255,.75);white-space:nowrap}.percent{font-size:clamp(30px,3.2vw,54px);font-weight:950;font-style:italic;line-height:1;min-width:3.55em;text-align:right;color:rgb(var(--bat-r),var(--bat-g),var(--bat-b));text-shadow:0 0 7px #fff,0 0 20px rgba(var(--bat-r),var(--bat-g),var(--bat-b),.95),0 0 42px rgba(var(--bat-r),var(--bat-g),var(--bat-b),.60);white-space:nowrap}.enneGauge{position:relative;height:clamp(34px,6.2vh,62px);border:3px solid rgba(247,251,255,.92);border-radius:15px;padding:6px;background:#02050a;overflow:hidden;box-shadow:0 0 8px rgba(255,255,255,.9),0 0 22px rgba(var(--bat-r),var(--bat-g),var(--bat-b),.55),inset 0 0 20px rgba(0,0,0,1)}.enneFill{position:absolute;left:6px;top:6px;bottom:6px;width:calc(var(--bat)*1% - 12px);max-width:calc(100% - 12px);min-width:0;border-radius:8px;background:linear-gradient(90deg,rgba(var(--bat-r),var(--bat-g),var(--bat-b),.82),rgb(var(--bat-r),var(--bat-g),var(--bat-b)));box-shadow:0 0 22px rgba(var(--bat-r),var(--bat-g),var(--bat-b),.95),0 0 42px rgba(var(--bat-r),var(--bat-g),var(--bat-b),.40);transition:width .35s ease,background .35s ease,box-shadow .35s ease}.enneSegments{position:relative;z-index:2;height:100%;display:grid;grid-template-columns:repeat(10,1fr);gap:5px;pointer-events:none}.enneSegments i{display:block;border-radius:6px;background:rgba(255,255,255,.052);box-shadow:inset 0 0 7px rgba(0,0,0,.55)}.enneFoot{display:flex;justify-content:space-between;align-items:center;font-size:clamp(10px,.88vw,14px);font-weight:900;letter-spacing:.12em;color:rgba(226,244,255,.60);white-space:nowrap}.batteryBox.critical .enneFill,.batteryBox.critical .percent{animation:batteryBlink .9s ease-in-out infinite}.batteryBox.critical .enneGauge{border-color:rgba(255,120,120,.96);box-shadow:0 0 9px rgba(255,255,255,.85),0 0 26px rgba(255,50,50,.75),inset 0 0 20px rgba(0,0,0,1)}@keyframes batteryBlink{0%,100%{opacity:1}50%{opacity:.42}}
.gps,.fs{position:absolute;bottom:clamp(8px,1.2vh,14px);z-index:20;padding:.56em 1.0em;border-radius:999px;background:rgba(0,0,0,.40);color:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.18);font-size:clamp(10px,.9vw,14px);font-weight:900;line-height:1;letter-spacing:.08em;touch-action:manipulation;backdrop-filter:blur(4px)}.gps{right:clamp(10px,1vw,16px);border-color:rgba(255,120,120,.72);box-shadow:0 0 18px rgba(255,70,70,.25)}.fs{right:clamp(12px,1.2vw,18px)}.gps.on{color:#dff6ff;border-color:rgba(24,168,255,.9);box-shadow:0 0 18px rgba(24,168,255,.55)}.gps.err{color:#fff;border-color:rgba(255,120,120,.9);box-shadow:0 0 18px rgba(255,80,80,.45)}
@media (max-aspect-ratio:4/3) and (orientation:landscape){.app{grid-template-rows:minmax(72px,22%) minmax(0,1fr)}.logoWrap{width:min(66vw,560px);height:84%}.right{grid-template-columns:minmax(0,.9fr) minmax(0,1.18fr) minmax(0,1fr);gap:8px}.speedValue{font-size:clamp(58px,10vw,130px)}.clock{font-size:clamp(42px,6.6vw,86px)}.date{font-size:clamp(21px,2.7vw,38px)}}
@media (orientation:portrait){.app{width:calc(var(--hud-vh)*100);height:100vw;max-width:none;max-height:none;left:calc((100vw - (var(--hud-vh)*100))/2);top:calc(((var(--hud-vh)*100) - 100vw)/2);transform:rotate(90deg);transform-origin:center center}.logoWrap{width:min(72vh,680px)}}

/* v9 PWA splash */
#lbSplash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2.2vh;background:radial-gradient(circle at 50% 22%,rgba(47,166,255,.24),transparent 34%),linear-gradient(90deg,#01050a,#03162b 60%,#020711);transition:opacity .55s ease,visibility .55s ease;overflow:hidden}
#lbSplash:before{content:"";position:absolute;inset:-20%;background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 7px);opacity:.55;animation:lbScan 2.8s linear infinite}
#lbSplash.hide{opacity:0;visibility:hidden;pointer-events:none}
#lbSplash .lbMark{position:relative;font-size:clamp(38px,8vw,118px);font-weight:950;font-style:italic;letter-spacing:.08em;line-height:.9;color:#f4fbff;text-shadow:0 0 8px #fff,0 0 24px rgba(97,185,255,.95),0 0 62px rgba(0,112,255,.82)}
#lbSplash .lbSub{position:relative;font-size:clamp(13px,1.6vw,24px);font-weight:900;letter-spacing:.32em;color:rgba(224,245,255,.82);text-shadow:0 0 16px rgba(63,174,255,.9)}
#lbSplash .lbBar{position:relative;width:min(46vw,420px);height:7px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;box-shadow:0 0 16px rgba(66,170,255,.46)}
#lbSplash .lbBar i{display:block;width:44%;height:100%;border-radius:inherit;background:linear-gradient(90deg,transparent,rgba(130,210,255,.95),transparent);animation:lbLoad 1.15s ease-in-out infinite}
@keyframes lbLoad{0%{transform:translateX(-110%)}100%{transform:translateX(260%)}}
@keyframes lbScan{0%{transform:translateY(0)}100%{transform:translateY(42px)}}

</style>
</head>

<script>
const $=id=>document.getElementById(id);
let watchId=null,lastPos=null,totalM=0,lastGoodKmh=0,wakeLock=null;
function relayout(){
  const vv=window.visualViewport;
  const w=Math.max(1,Math.round((vv&&vv.width)||window.innerWidth||document.documentElement.clientWidth||1));
  const h=Math.max(1,Math.round((vv&&vv.height)||window.innerHeight||document.documentElement.clientHeight||1));
  document.documentElement.style.setProperty('--hud-w',w+'px');
  document.documentElement.style.setProperty('--hud-vh',(h*.01)+'px');
}
function relayoutMany(){[40,120,300,700,1200].forEach(t=>setTimeout(relayout,t));}
relayout(); relayoutMany();
window.addEventListener('resize',relayoutMany,{passive:true});
window.addEventListener('orientationchange',relayoutMany,{passive:true});
if(window.visualViewport){visualViewport.addEventListener('resize',relayout,{passive:true});visualViewport.addEventListener('scroll',relayout,{passive:true});}
function pad(n){return String(n).padStart(2,'0')}
function tick(){const d=new Date();const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];$('clock').textContent=pad(d.getHours())+':'+pad(d.getMinutes());$('date').textContent=d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+days[d.getDay()];}
setInterval(tick,1000);tick();
function batteryColor(p){
  const stops=[[0,[255,32,32]],[10,[255,62,45]],[25,[255,120,0]],[40,[255,210,60]],[60,[70,230,90]],[80,[40,220,255]],[100,[24,168,255]]];
  for(let i=1;i<stops.length;i++){
    const [p2,c2]=stops[i], [p1,c1]=stops[i-1];
    if(p<=p2){const t=(p-p1)/(p2-p1);return c1.map((v,j)=>Math.round(v+(c2[j]-v)*t));}
  }
  return stops.at(-1)[1];
}
function setBattery(p){
  p=Math.max(0,Math.min(100,Math.round(p||0)));
  const [r,g,b]=batteryColor(p);
  document.documentElement.style.setProperty('--bat',p);
  document.documentElement.style.setProperty('--bat-r',r);
  document.documentElement.style.setProperty('--bat-g',g);
  document.documentElement.style.setProperty('--bat-b',b);
  $('percent').textContent=p+'%';
  document.querySelector('.batteryBox').classList.toggle('critical',p<=10);
}
async function battery(){try{if(!navigator.getBattery){setBattery(40);return}const b=await navigator.getBattery();const upd=()=>setBattery(Math.round(b.level*100));b.addEventListener('levelchange',upd);upd();}catch(e){setBattery(40)}}
battery();
function setGpsStatus(t){$('gpsStatus').textContent=t;$('gps').classList.toggle('on',t.startsWith('GPS ON'));$('gps').classList.toggle('err',!t.startsWith('GPS ON')&&t!=='GPS CHECK');}
function setSpeedDisplay(kmh){$('speed').textContent=Number.isFinite(kmh)?String(Math.max(0,Math.round(kmh))):'0'}
function hav(a,b){const R=6371000,rad=x=>x*Math.PI/180;const dLat=rad(b.coords.latitude-a.coords.latitude),dLon=rad(b.coords.longitude-a.coords.longitude),lat1=rad(a.coords.latitude),lat2=rad(b.coords.latitude);const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(h))}
function addDistance(pos){if(lastPos){const m=hav(lastPos,pos);if(m>1&&m<80)totalM+=m;$('dist').textContent=(totalM/1000).toFixed(1)}lastPos=pos}
function calcSpeedKmh(pos){if(Number.isFinite(pos.coords.speed)&&pos.coords.speed>=0)return pos.coords.speed*3.6;if(lastPos){const dt=(pos.timestamp-lastPos.timestamp)/1000;if(dt>0){const kmh=hav(lastPos,pos)/dt*3.6;if(kmh>=0&&kmh<80){lastGoodKmh=lastGoodKmh*.55+kmh*.45;return lastGoodKmh}}}return NaN}
function gpsErrorText(err){if(err.code===1)return 'GPS DENY';if(err.code===2)return 'GPS LOST';if(err.code===3)return 'GPS TIMEOUT';return 'GPS ERR'}
async function keepAwake(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen')}catch(e){}}
function handlePosition(pos){const kmh=calcSpeedKmh(pos);addDistance(pos);setSpeedDisplay(kmh);const acc=Number.isFinite(pos.coords.accuracy)?Math.round(pos.coords.accuracy):'--';setGpsStatus('GPS ON '+acc+'m')}
async function startGps(){relayoutMany();if(!navigator.geolocation){setGpsStatus('GPS NG');return}await keepAwake();setGpsStatus('GPS CHECK');if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}watchId=navigator.geolocation.watchPosition(handlePosition,e=>setGpsStatus(gpsErrorText(e)),{enableHighAccuracy:true,maximumAge:400,timeout:12000})}
$('gps').addEventListener('click',startGps);
$('fs').addEventListener('click',async()=>{relayoutMany();const el=document.documentElement;try{if(!document.fullscreenElement&&el.requestFullscreen){await el.requestFullscreen({navigationUI:'hide'})}else if(document.fullscreenElement&&document.exitFullscreen){await document.exitFullscreen()}}catch(e){}try{if(screen.orientation&&screen.orientation.lock)await screen.orientation.lock('landscape')}catch(e){}relayoutMany()});
document.addEventListener('fullscreenchange',relayoutMany);
document.addEventListener('dblclick',()=>$('fs').click());
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){relayoutMany();if(watchId!==null)keepAwake()}});
</script>


<style id="customHudStyle">
:root{
  --custom-glow-r:24;
  --custom-glow-g:168;
  --custom-glow-b:255;
  --custom-speed-r:255;
  --custom-speed-g:255;
  --custom-speed-b:255;
}
body.customBg::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 50% 50%,rgba(var(--custom-glow-r),var(--custom-glow-g),var(--custom-glow-b),.10),transparent 42%),
    linear-gradient(90deg,rgba(0,0,0,.62),rgba(0,8,20,.24),rgba(0,0,0,.58));
}
.app{z-index:1}
.logoPanel,.clock,.box{
  border-color:rgba(var(--custom-glow-r),var(--custom-glow-g),var(--custom-glow-b),.34)!important;
  box-shadow:
    inset 0 0 28px rgba(var(--custom-glow-r),var(--custom-glow-g),var(--custom-glow-b),.13),
    0 0 18px rgba(var(--custom-glow-r),var(--custom-glow-g),var(--custom-glow-b),.18)!important;
}
.clock,.speedValue,.date,.distanceLine{
  color:rgb(var(--custom-speed-r),var(--custom-speed-g),var(--custom-speed-b));
  text-shadow:
    0 0 8px #fff,
    0 0 24px rgba(var(--custom-glow-r),var(--custom-glow-g),var(--custom-glow-b),.96),

<script id="customHudScript">
(function(){
  const $id = id => document.getElementById(id);
  const menuBtn = $id('hudMenuBtn');
  const panel = $id('hudPanel');
  const bgPicker = $id('bgPicker');
  const logoPicker = $id('logoPicker');
  const logoImg = document.querySelector('.logoWrap img');

  const themes = {
    lonesome:{
      bg:'radial-gradient(circle at 50% 18%,rgba(54,177,255,.22),transparent 35%),linear-gradient(90deg,#01050a 0%,#020712 50%,#011d38 100%)',
      glow:'#18a8ff', speed:'#ffffff'
    },
    bandmaid:{
      bg:'radial-gradient(circle at 54% 20%,rgba(255,255,255,.18),transparent 32%),linear-gradient(90deg,#050505 0%,#151515 48%,#f5f5f5 100%)',
      glow:'#ffffff', speed:'#ffffff'
    },
    unlucky:{
      bg:'radial-gradient(circle at 50% 18%,rgba(190,40,255,.25),transparent 34%),linear-gradient(90deg,#050008 0%,#170020 52%,#33004f 100%)',
      glow:'#b833ff', speed:'#ffffff'
    },
    east:{
      bg:'radial-gradient(circle at 50% 18%,rgba(255,55,80,.24),transparent 34%),linear-gradient(90deg,#080004 0%,#190009 48%,#3a0011 100%)',
      glow:'#ff335f', speed:'#ffffff'
    }
  };

  function hexToRgb(hex){
    const s = hex.replace('#','');
    const n = parseInt(s.length===3 ? s.split('').map(c=>c+c).join('') : s,16);
    return [(n>>16)&255,(n>>8)&255,n&255];
  }
  function setRgbVars(prefix, hex){
    const [r,g,b]=hexToRgb(hex);
    document.documentElement.style.setProperty(prefix+'-r',r);
    document.documentElement.style.setProperty(prefix+'-g',g);
    document.documentElement.style.setProperty(prefix+'-b',b);
  }
  function setGlow(hex){ setRgbVars('--custom-glow',hex); $id('glowColor').value=hex; localStorage.setItem('hudGlowColor',hex); }
  function setSpeedColor(hex){ setRgbVars('--custom-speed',hex); $id('speedColor').value=hex; localStorage.setItem('hudSpeedColor',hex); }

  function bgCssValue(bg){
    return bg.startsWith('data:') ? 'url("'+bg+'")' : bg;
  }
  function applyBgPosition(){
    const x = localStorage.getItem('hudBgX') || '50';
    const y = localStorage.getItem('hudBgY') || '50';
    document.documentElement.style.setProperty('--hud-bg-x', x + '%');
    document.documentElement.style.setProperty('--hud-bg-y', y + '%');
    document.body.style.backgroundPosition = x + '% ' + y + '%';
  }
  function applyBgBlur(){
    const on = localStorage.getItem('hudBgBlurOn') === '1';
    document.body.classList.toggle('bgBlurOn', on);
    document.documentElement.style.setProperty('--hud-bg-blur', (localStorage.getItem('hudBgBlur') || '7') + 'px');
    const btn = $id('bgBlurBtn');
    if(btn) btn.textContent = on ? '背景ぼかし：ON' : '背景ぼかし：OFF';
  }
  function applyBg(bg, save=true){
    document.body.classList.add('customBg');
    const css = bgCssValue(bg);
    document.documentElement.style.setProperty('--hud-custom-bg', css);
    document.body.style.backgroundImage = css;
    document.body.style.backgroundSize = localStorage.getItem('hudBgFit') || 'cover';
    document.body.style.backgroundRepeat = 'no-repeat';
    applyBgPosition();
    applyBgBlur();
    if(save) localStorage.setItem('hudCustomBg',bg);
  }
  function applyLogo(data, save=true){
    if(!logoImg) return;
    logoImg.src = data;
    if(save) localStorage.setItem('hudCustomLogo',data);
  }
  function applyTheme(name){
    const t = themes[name] || themes.lonesome;
    const currentBg = localStorage.getItem('hudCustomBg') || '';
    const keepImageBg = currentBg.startsWith('data:image/');
    // 画像背景を使っている時は、テーマ呼出や保存設定呼出で背景を上書きしない
    if(keepImageBg){
      applyBg(currentBg,false);
    }else{
      applyBg(t.bg,true);
    }
    setGlow(t.glow);
    setSpeedColor(t.speed);
    localStorage.setItem('hudTheme',name);
  }

  menuBtn.addEventListener('click',()=>{
    panel.classList.toggle('open');
    panel.setAttribute('aria-hidden',panel.classList.contains('open')?'false':'true');
  });

  document.querySelectorAll('[data-theme]').forEach(btn=>{
    btn.addEventListener('click',()=>applyTheme(btn.dataset.theme));
  });

  $id('customBgBtn').addEventListener('click',()=>bgPicker.click());
  $id('customLogoBtn').addEventListener('click',()=>logoPicker.click());

  bgPicker.addEventListener('change',e=>{
    const f=e.target.files && e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=ev=>applyBg(ev.target.result,true);
    r.readAsDataURL(f);
  });

  logoPicker.addEventListener('change',e=>{
    const f=e.target.files && e.target.files[0];
    if(!f) return;
    const r=new FileReader();
    r.onload=ev=>applyLogo(ev.target.result,true);
    r.readAsDataURL(f);
  });

  $id('glowColor').addEventListener('input',e=>setGlow(e.target.value));
  $id('speedColor').addEventListener('input',e=>setSpeedColor(e.target.value));

  function updateFitLabel(){
    const fit = localStorage.getItem('hudBgFit') || 'cover';
    const btn = $id('bgFitBtn');
    if(btn) btn.textContent = fit === 'contain' ? '背景表示：全体表示' : '背景表示：画面いっぱい';
  }
  const bgFitBtn = $id('bgFitBtn');
  if(bgFitBtn){
    bgFitBtn.addEventListener('click',()=>{
      const next = (localStorage.getItem('hudBgFit') || 'cover') === 'cover' ? 'contain' : 'cover';
      localStorage.setItem('hudBgFit',next);
      document.body.style.backgroundSize = next;
      document.body.style.backgroundColor = '#02060c';
      updateFitLabel();
    });
    updateFitLabel();
  }

  function moveBg(dx,dy){
    const x = Math.max(0, Math.min(100, parseInt(localStorage.getItem('hudBgX') || '50',10) + dx));
    const y = Math.max(0, Math.min(100, parseInt(localStorage.getItem('hudBgY') || '50',10) + dy));
    localStorage.setItem('hudBgX', String(x));
    localStorage.setItem('hudBgY', String(y));
    applyBgPosition();
  }
  const bgBlurBtn = $id('bgBlurBtn');
  if(bgBlurBtn){
    bgBlurBtn.addEventListener('click',()=>{
      localStorage.setItem('hudBgBlurOn', localStorage.getItem('hudBgBlurOn') === '1' ? '0' : '1');
      applyBgBlur();
    });
    applyBgBlur();
  }
  const bgUpBtn = $id('bgUpBtn'); if(bgUpBtn) bgUpBtn.addEventListener('click',()=>moveBg(0,-5));
  const bgDownBtn = $id('bgDownBtn'); if(bgDownBtn) bgDownBtn.addEventListener('click',()=>moveBg(0,5));
  const bgLeftBtn = $id('bgLeftBtn'); if(bgLeftBtn) bgLeftBtn.addEventListener('click',()=>moveBg(-5,0));
  const bgRightBtn = $id('bgRightBtn'); if(bgRightBtn) bgRightBtn.addEventListener('click',()=>moveBg(5,0));
  const bgCenterBtn = $id('bgCenterBtn');
  if(bgCenterBtn) bgCenterBtn.addEventListener('click',()=>{
    localStorage.setItem('hudBgX','50');
    localStorage.setItem('hudBgY','50');
    applyBgPosition();
  });

  $id('clearCustomBtn').addEventListener('click',()=>{
    localStorage.removeItem('hudCustomBg');
    localStorage.removeItem('hudCustomLogo');
    localStorage.removeItem('hudTheme');
    localStorage.removeItem('hudBgFit');
    localStorage.removeItem('hudBgX');
    localStorage.removeItem('hudBgY');
    localStorage.removeItem('hudBgBlurOn');
    localStorage.removeItem('hudBgBlur');
    applyTheme('lonesome');
    location.reload();
  });

  const savedTheme = localStorage.getItem('hudTheme');
  if(savedTheme && themes[savedTheme]) applyTheme(savedTheme);
  const savedBg = localStorage.getItem('hudCustomBg');
  if(savedBg) applyBg(savedBg,false);
  const savedLogo = localStorage.getItem('hudCustomLogo');
  if(savedLogo) applyLogo(savedLogo,false);
  setGlow(localStorage.getItem('hudGlowColor') || (themes[savedTheme]?.glow) || '#18a8ff');
  setSpeedColor(localStorage.getItem('hudSpeedColor') || '#ffffff');
})();
</script>

<script id="fullCustomPresetScript">
(function(){
  const $=id=>document.getElementById(id);
  const panel=$('hudPanel');
  if(!panel || $('fullCustomMarker')) return;
  const grid=panel.querySelector('.hudGrid');
  const note=panel.querySelector('.hudNote');
  function add(html){ grid.insertAdjacentHTML('beforeend',html); }
  add('<div id="fullCustomMarker" class="hudSectionTitle">LOGO</div>');
  add('<label class="hudRange"><span>ロゴサイズ</span><input id="logoScaleRange" type="range" min="55" max="145" step="5"><b id="logoScaleVal"></b></label>');
  add('<button id="logoUpBtn">ロゴ ↑</button><button id="logoDownBtn">ロゴ ↓</button><button id="logoLeftBtn">ロゴ ←</button><button id="logoRightBtn">ロゴ →</button><button id="logoCenterBtn" class="wide">ロゴ位置：中央に戻す</button>');
  add('<label class="hudRange"><span>ロゴ発光</span><input id="logoGlowRange" type="range" min="0" max="100" step="5"><b id="logoGlowVal"></b></label>');
  add('<div class="hudSectionTitle">COLOR / GLOW</div>');
  add('<button id="presetNightBtn">夜モード</button><button id="presetDayBtn">昼モード</button><button id="glowLowBtn">発光 弱</button><button id="glowMidBtn">発光 中</button><button id="glowHighBtn">発光 強</button><button id="glowMaxBtn">爆光</button>');
  add('<div class="hudSectionTitle">表示 ON/OFF</div>');
  add('<button id="toggleClockBtn">時計 ON</button><button id="toggleDateBtn">日付 ON</button><button id="toggleGpsBtn">GPS ON</button><button id="toggleDistBtn">距離 ON</button><button id="toggleBatteryFrameBtn">電池枠 ON</button><button id="togglePanelsBtn">枠 ON</button>');
  add('<div class="hudSectionTitle">PRESET SAVE</div>');
  add('<button id="savePresetBtn">今の設定を保存</button><button id="loadPresetBtn">保存設定を呼出</button>');
  if(note) note.innerHTML += '<br>追加：ロゴ位置/サイズ、発光強度、各表示ON/OFF、夜/昼モード、保存プリセット対応。';

  const root=document.documentElement;
  const get=(k,d)=>localStorage.getItem(k) ?? d;
  const set=(k,v)=>localStorage.setItem(k,String(v));
  function setVar(k,v){ root.style.setProperty(k,v); }
  function updateRange(id,valId,key,unit,cssVar,format){
    const el=$(id), out=$(valId); if(!el) return;
    const v=get(key,el.min||'0'); el.value=v;
    if(out) out.textContent=format?format(v):v+unit;
    setVar(cssVar, unit==='px' ? v+'px' : v);
    el.addEventListener('input',()=>{set(key,el.value);setVar(cssVar,unit==='px'?el.value+'px':el.value); if(out) out.textContent=format?format(el.value):el.value+unit;});
  }
  function applyLogoControls(){
    const scale=get('hudLogoScale','100');
    setVar('--hud-logo-scale',scale);
    setVar('--hud-logo-x',get('hudLogoX','0')+'px');
    setVar('--hud-logo-y',get('hudLogoY','0')+'px');
    setVar('--hud-logo-glow',String(Number(get('hudLogoGlow','62'))/100));
    const s=$('logoScaleRange'); if(s){s.value=scale; $('logoScaleVal').textContent=scale+'%';}
    const g=$('logoGlowRange'); if(g){g.value=get('hudLogoGlow','62'); $('logoGlowVal').textContent=get('hudLogoGlow','62')+'%';}
  }
  applyLogoControls();
  updateRange('logoScaleRange','logoScaleVal','hudLogoScale','', '--hud-logo-scale',v=>v+'%');
  updateRange('logoGlowRange','logoGlowVal','hudLogoGlow','', '--hud-logo-glow',v=>{setVar('--hud-logo-glow',String(Number(v)/100));return v+'%'});
  function moveLogo(dx,dy){set('hudLogoX',Number(get('hudLogoX','0'))+dx);set('hudLogoY',Number(get('hudLogoY','0'))+dy);applyLogoControls();}
  $('logoUpBtn').onclick=()=>moveLogo(0,-4); $('logoDownBtn').onclick=()=>moveLogo(0,4); $('logoLeftBtn').onclick=()=>moveLogo(-4,0); $('logoRightBtn').onclick=()=>moveLogo(4,0);

<script id="ultimateRequestedAllScript">
(function(){
  const $=id=>document.getElementById(id);
  const root=document.documentElement;
  const get=(k,d)=>localStorage.getItem(k) ?? d;
  const set=(k,v)=>localStorage.setItem(k,String(v));
  function setVar(k,v){root.style.setProperty(k,v);}

  // MENU表記変更
  const menu=$('hudMenuBtn');
  if(menu) menu.textContent='⚙ SETTINGS';
  const title=document.querySelector('#hudPanel h3');
  if(title) title.textContent='⚙ HUD SETTINGS';

  // GPSをバッジ表示にする
  window.setGpsStatus=function(t){
    const st=$('gpsStatus'), btn=$('gps');
    if(st){
      st.classList.remove('gps-ok','gps-err','gps-check');
      let state='ERR', cls='gps-err';
      if(String(t).startsWith('GPS ON')){ state=String(t).replace('GPS ON','ON').trim(); cls='gps-ok'; }
      else if(String(t)==='GPS CHECK'){ state='CHECK'; cls='gps-check'; }
      else if(String(t).startsWith('GPS')){ state=String(t).replace('GPS','').trim() || 'ERR'; cls='gps-err'; }
      st.classList.add(cls);
      st.innerHTML='<b>GPS</b><span>'+state+'</span>';
    }
    if(btn){
      btn.classList.toggle('on',String(t).startsWith('GPS ON'));
      btn.classList.toggle('err',!String(t).startsWith('GPS ON')&&String(t)!=='GPS CHECK');
    }
  };
  if($('gpsStatus')) window.setGpsStatus($('gpsStatus').textContent || 'GPS ERR');

  // テーマ別バッテリー色。低残量は安全優先で赤/橙。
  const batteryThemes={
    lonesome:[24,168,255],
    bandmaid:[190,70,255],
    unlucky:[190,50,255],
    east:[255,50,95]
  };
  function mix(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}
  function themedBatteryColor(p){
    if(p<=15) return [255,32,48];
    if(p<=35) return mix([255,115,0],[255,205,50],(p-15)/20);
    const theme=get('hudTheme','lonesome');
    const base=batteryThemes[theme]||[70,230,90];
    if(p<55) return mix([255,210,60],base,(p-35)/20);
    return base;
  }
  window.setBattery=function(p){
    p=Math.max(0,Math.min(100,Math.round(p||0)));
    const [r,g,b]=themedBatteryColor(p);
    setVar('--bat',p);
    setVar('--bat-r',r);
    setVar('--bat-g',g);
    setVar('--bat-b',b);
    if($('percent')) $('percent').textContent=p+'%';
    const box=document.querySelector('.batteryBox');
    if(box) box.classList.toggle('critical',p<=10);
  };
  function refreshBattery(){
    const p=parseInt(($('percent')?.textContent||'40').replace(/[^0-9]/g,''),10);
    window.setBattery(Number.isFinite(p)?p:40);
  }
  refreshBattery();
  document.querySelectorAll('[data-theme]').forEach(btn=>btn.addEventListener('click',()=>setTimeout(refreshBattery,30)));

  // HUD透明度スライダーを設定に追加

    grid.insertAdjacentHTML('beforeend','<button id="panelClearBtn">背景重視</button><button id="panelSolidBtn">HUD重視</button>');
  }
  function applyPanelAlpha(v){
    v=Number(v); if(!Number.isFinite(v)) v=48;
    const alpha=Math.max(0,Math.min(100,v))/100;
    set('hudPanelAlpha',v);
    setVar('--hud-panel-alpha',String(alpha));
    setVar('--hud-panel-border-alpha',String(Math.max(.08,alpha*.62)));
    const r=$('panelAlphaRange'), o=$('panelAlphaVal');
    if(r) r.value=String(v);
    if(o) o.textContent=String(v)+'%';
  }
  applyPanelAlpha(get('hudPanelAlpha','48'));
  if($('panelAlphaRange')) $('panelAlphaRange').addEventListener('input',e=>applyPanelAlpha(e.target.value));
  if($('panelClearBtn')) $('panelClearBtn').onclick=()=>applyPanelAlpha(18);
  if($('panelSolidBtn')) $('panelSolidBtn').onclick=()=>applyPanelAlpha(68);

  // 既存の保存プリセットに透明度も含める補助
  const oldSave=$('savePresetBtn')?.onclick;
  if($('savePresetBtn')){
    $('savePresetBtn').addEventListener('click',()=>{
      try{
        const raw=localStorage.getItem('hudSavedPreset1');
        const o=raw?JSON.parse(raw):{};
        o.hudPanelAlpha=localStorage.getItem('hudPanelAlpha')||'48';
        localStorage.setItem('hudSavedPreset1',JSON.stringify(o));
      }catch(e){}
    });
  }
})();
</script>



<script id="presetBackgroundFixScript">
(function(){
  const $=id=>document.getElementById(id);
  const get=(k,d)=>localStorage.getItem(k) ?? d;
  const set=(k,v)=>localStorage.setItem(k,String(v));
  const isImageBg=v=>typeof v==='string' && v.startsWith('data:image/');
  const bgCssValue=bg=>isImageBg(bg) ? 'url("'+bg+'")' : bg;

  function applyCurrentBackground(){
    const bg=localStorage.getItem('hudCustomBg');
    if(!bg) return;
    document.body.classList.add('customBg');
    document.documentElement.style.setProperty('--hud-custom-bg', bgCssValue(bg));
    document.body.style.backgroundImage=bgCssValue(bg);
    document.body.style.backgroundSize=localStorage.getItem('hudBgFit') || 'cover';
    document.body.style.backgroundRepeat='no-repeat';
    const x=localStorage.getItem('hudBgX') || '50';
    const y=localStorage.getItem('hudBgY') || '50';
    document.documentElement.style.setProperty('--hud-bg-x',x+'%');
    document.documentElement.style.setProperty('--hud-bg-y',y+'%');
    document.body.style.backgroundPosition=x+'% '+y+'%';
  }

  const presetKeys=['hudCustomBg','hudCustomLogo','hudTheme','hudBgFit','hudBgX','hudBgY','hudBgBlurOn','hudGlowColor','hudSpeedColor','hudLogoScale','hudLogoX','hudLogoY','hudLogoGlow','hudGlowMode','hudHideClock','hudHideDate','hudHideGps','hudHideDist','hudHideBatteryFrame','hudHidePanels','hudPanelAlpha'];

  function savePresetSafe(){
    const o={};
    presetKeys.forEach(k=>{const v=localStorage.getItem(k); if(v!==null)o[k]=v;});
    try{
      localStorage.setItem('hudSavedPreset1',JSON.stringify(o));
      const b=$('savePresetBtn'); if(b){b.textContent='保存した'; setTimeout(()=>b.textContent='今の設定を保存',900);}
    }catch(e){
      // 画像入りプリセットが容量オーバーした場合でも、今の背景画像は消さず設定だけ保存
      const bg=o.hudCustomBg;
      delete o.hudCustomBg;
      localStorage.setItem('hudSavedPreset1',JSON.stringify(o));
      if(bg) localStorage.setItem('hudCustomBg',bg);
      const b=$('savePresetBtn'); if(b){b.textContent='画像以外保存'; setTimeout(()=>b.textContent='今の設定を保存',1300);}
    }
  }

  function loadPresetSafe(){
    try{
      const currentBg=localStorage.getItem('hudCustomBg');
      const currentLogo=localStorage.getItem('hudCustomLogo');
      const o=JSON.parse(localStorage.getItem('hudSavedPreset1')||'{}');
      Object.entries(o).forEach(([k,v])=>localStorage.setItem(k,v));
      // 保存プリセットに画像背景が入っていない場合、今表示している背景画像を維持する
      if(!isImageBg(o.hudCustomBg) && isImageBg(currentBg)) localStorage.setItem('hudCustomBg',currentBg);
      if(!o.hudCustomLogo && currentLogo) localStorage.setItem('hudCustomLogo',currentLogo);
      applyCurrentBackground();
      location.reload();
    }catch(e){
      const b=$('loadPresetBtn'); if(b){b.textContent='呼出エラー'; setTimeout(()=>b.textContent='保存設定を呼出',1200);}
    }
  }

  window.addEventListener('load',()=>{
    const save=$('savePresetBtn'), load=$('loadPresetBtn');
    if(save){ save.onclick=null; save.addEventListener('click',savePresetSafe); }
    if(load){ load.onclick=null; load.addEventListener('click',loadPresetSafe); }
    applyCurrentBackground();
  });
})();
</script>


<script id="hardBackgroundKeepScript">

<script id="ultimateV3CompletePatchScript">
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  const root=document.documentElement;
  const isImg=v=>typeof v==='string' && v.startsWith('data:image/');
  const cssUrl=v=>isImg(v)?'url("'+v+'")':v;
  const get=(k,d)=>localStorage.getItem(k) ?? d;
  const set=(k,v)=>{try{localStorage.setItem(k,String(v));}catch(e){}};
  function setVar(k,v){root.style.setProperty(k,v);}
  function status(msg,type='ok'){
    const el=$('v3Status');
    if(!el) return;
    el.className='v3Status '+type;
    el.textContent=msg;
  }

  function ensureControls(){
    const panel=$('hudPanel');
    const grid=panel && panel.querySelector('.hudGrid');
    if(!grid || $('v3CompleteMarker')) return;
    grid.insertAdjacentHTML('beforeend', `
      <div id="v3CompleteMarker" class="hudSectionTitle">BACKGROUND V3</div>
      <label class="hudRange smallText"><span>背景 横位置</span><input id="v3BgX" type="range" min="0" max="100" step="1"><b id="v3BgXVal"></b></label>
      <label class="hudRange smallText"><span>背景 縦位置</span><input id="v3BgY" type="range" min="0" max="100" step="1"><b id="v3BgYVal"></b></label>
      <label class="hudRange smallText"><span>背景 拡大</span><input id="v3BgZoom" type="range" min="70" max="180" step="2"><b id="v3BgZoomVal"></b></label>
      <label class="hudRange smallText"><span>背景ぼかし</span><input id="v3BgBlur" type="range" min="0" max="18" step="1"><b id="v3BgBlurVal"></b></label>
      <label class="hudRange smallText"><span>暗幕</span><input id="v3BgDim" type="range" min="0" max="80" step="2"><b id="v3BgDimVal"></b></label>
      <button id="v3BgResetBtn">背景初期化</button><button id="v3FsBtn">全画面復帰</button>
      <div id="v3Status" class="v3Status">V3補正：背景画像は軽量化して保存します。</div>
    `);
  }

  function calcBgSize(){
    const fit=get('hudBgFit','cover');
    const z=Math.max(70,Math.min(180,Number(get('hudBgZoom','100'))||100));
    if(fit==='contain') return 'contain';
    return z===100 ? 'cover' : z+'% auto';
  }
  function applyV3Bg(){
    const bg=get('hudCustomBg','');
    if(bg){
      document.body.classList.add('customBg');
      setVar('--hud-custom-bg',cssUrl(bg));
      document.body.style.setProperty('background-image',cssUrl(bg),'important');
    }
    const x=get('hudBgX','50'), y=get('hudBgY','50');
    setVar('--hud-bg-x',x+'%'); setVar('--hud-bg-y',y+'%');
    setVar('--hud-bg-size',calcBgSize());
    setVar('--hud-bg-blur',get('hudBgBlur','0')+'px');
    setVar('--hud-bg-dim',String((Number(get('hudBgDim','42'))||0)/100));
    document.body.style.setProperty('background-size',calcBgSize(),'important');
    document.body.style.setProperty('background-position',x+'% '+y+'%','important');
    document.body.style.setProperty('background-repeat','no-repeat','important');
    document.body.classList.toggle('bgBlurOn',Number(get('hudBgBlur','0'))>0 || get('hudBgBlurOn','0')==='1');
    syncControls();
  }
  function syncControls(){
    const map=[
      ['v3BgX','hudBgX','50','%'],['v3BgY','hudBgY','50','%'],['v3BgZoom','hudBgZoom','100','%'],
      ['v3BgBlur','hudBgBlur','0','px'],['v3BgDim','hudBgDim','42','%']
    ];
    map.forEach(([id,key,d,unit])=>{
      const input=$(id), val=$(id+'Val'); if(!input) return;
      input.value=get(key,d); if(val) val.textContent=get(key,d)+unit;
    });
    const oldBlurBtn=$('bgBlurBtn');
    if(oldBlurBtn) oldBlurBtn.textContent=Number(get('hudBgBlur','0'))>0?'背景ぼかし：ON':'背景ぼかし：OFF';
  }
  function bindControl(id,key,d,after){
    const input=$(id); if(!input) return;
    input.value=get(key,d);
    input.addEventListener('input',()=>{set(key,input.value); if(id==='v3BgBlur') set('hudBgBlurOn',Number(input.value)>0?'1':'0'); applyV3Bg(); if(after) after();});
  }

  async function compressImageFile(file){
    const data=await new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=e=>resolve(e.target.result); r.onerror=reject; r.readAsDataURL(file);});
    if(!file.type.startsWith('image/') || file.type==='image/gif') return data;
    const img=await new Promise((resolve,reject)=>{const i=new Image(); i.onload=()=>resolve(i); i.onerror=reject; i.src=data;});
    const maxSide=1600;
    let w=img.naturalWidth, h=img.naturalHeight;
    const scale=Math.min(1,maxSide/Math.max(w,h));
    w=Math.round(w*scale); h=Math.round(h*scale);
    const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d',{alpha:false});
    ctx.fillStyle='#02060c'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
    return canvas.toDataURL('image/jpeg',0.88);
  }
  async function saveBgData(data){
    try{
      localStorage.setItem('hudCustomBg',data);
      sessionStorage.setItem('hudLockedImageBg',data);
      applyV3Bg();
      status('背景を保存しました。次回起動でも維持します。','ok');
    }catch(e){
      try{
        sessionStorage.setItem('hudLockedImageBg',data);
        applyV3Bg();
      }catch(_e){}
      status('画像が大きすぎて長期保存できません。小さめ画像なら保存安定します。','warn');
    }
  }
  function overrideBgPicker(){
    const old=$('bgPicker'); if(!old || old.dataset.v3Ready==='1') return;
    const fresh=old.cloneNode(true);
    fresh.id='bgPicker'; fresh.dataset.v3Ready='1';
    old.replaceWith(fresh);
    fresh.addEventListener('change',async e=>{
      const f=e.target.files && e.target.files[0]; if(!f) return;
      status('背景画像を軽量化して保存中…','warn');
      try{ await saveBgData(await compressImageFile(f)); }
      catch(err){ status('背景画像の読込に失敗しました。別画像で試してください。','warn'); }
      fresh.value='';
    });
    const btn=$('customBgBtn');
    if(btn){ btn.onclick=null; btn.addEventListener('click',()=>fresh.click()); }
  }

  async function goFullscreen(){
    try{
      const el=document.documentElement;
      if(!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen({navigationUI:'hide'});
      if(screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
      window.dispatchEvent(new Event('resize'));
      status('全画面を再要求しました。','ok');
    }catch(e){ status('全画面は画面タップ直後だけ許可される場合があります。もう一度押してください。','warn'); }
  }

  function init(){
    ensureControls();
    overrideBgPicker();
    bindControl('v3BgX','hudBgX','50');
    bindControl('v3BgY','hudBgY','50');
    bindControl('v3BgZoom','hudBgZoom','100');
    bindControl('v3BgBlur','hudBgBlur','0');
    bindControl('v3BgDim','hudBgDim','42');
    const reset=$('v3BgResetBtn');
    if(reset) reset.onclick=()=>{set('hudBgX','50');set('hudBgY','50');set('hudBgZoom','100');set('hudBgBlur','0');set('hudBgBlurOn','0');set('hudBgDim','42');applyV3Bg();status('背景位置・拡大・ぼかし・暗幕を初期化しました。','ok');};
    const fs=$('v3FsBtn'); if(fs) fs.onclick=goFullscreen;
    const fsMain=$('fs'); if(fsMain) fsMain.addEventListener('click',()=>setTimeout(applyV3Bg,80));
    const oldFit=$('bgFitBtn'); if(oldFit) oldFit.addEventListener('click',()=>setTimeout(()=>{setVar('--hud-bg-size',calcBgSize());applyV3Bg();},60));
    const oldBlur=$('bgBlurBtn'); if(oldBlur) oldBlur.addEventListener('click',()=>{const on=get('hudBgBlurOn','0')==='1'; if(on && Number(get('hudBgBlur','0'))===0) set('hudBgBlur','7'); if(!on) set('hudBgBlur','0'); setTimeout(applyV3Bg,20);});
    ['load','pageshow','resize','orientationchange','fullscreenchange','visibilitychange'].forEach(ev=>window.addEventListener(ev,()=>setTimeout(applyV3Bg,30)));
    applyV3Bg();
    status('V3補正ON：背景保存・位置調整・ぼかし・暗幕・全画面復帰を強化済み。','ok');
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>

(function(){

  function callFs(el){
    // Android/Chromeで一番通りやすいよう、options無しで直接呼ぶ
    if(el.requestFullscreen) return el.requestFullscreen();
    if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    if(el.webkitEnterFullscreen) return el.webkitEnterFullscreen();
    if(el.mozRequestFullScreen) return el.mozRequestFullScreen();

<script id="v4FullscreenGpsButtonPatchScript">
(function(){
  'use strict';
  const d=document;
  let lastGpsTap=0;
  let hintTimer=null;

  function fullEl(){
    return d.fullscreenElement || d.webkitFullscreenElement || d.mozFullScreenElement || d.msFullscreenElement;
  }
  function requestFs(el){
    el = el || d.documentElement;
    if(el.requestFullscreen) return el.requestFullscreen();
    if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    if(el.mozRequestFullScreen) return el.mozRequestFullScreen();
    if(el.msRequestFullscreen) return el.msRequestFullscreen();
  }
  function relayoutAll(){
    try{ window.dispatchEvent(new Event('resize')); }catch(e){}
    try{ if(typeof window.relayoutMany==='function') window.relayoutMany(); }catch(e){}
    try{ if(typeof window.relayout==='function') window.relayout(); }catch(e){}
    try{ if(typeof window.applyV3Bg==='function') window.applyV3Bg(); }catch(e){}
    try{
      if(screen.orientation && screen.orientation.lock){
        screen.orientation.lock('landscape').catch(()=>{});
      }
    }catch(e){}
  }
  function setOverlayHidden(){
    const o=d.getElementById('v32StartOverlay');
    if(o) o.classList.add('hide');
  }
  function showHint(msg, ms){
    const h=d.getElementById('v4FullHint');
    if(!h) return;
    h.textContent=msg;
    h.style.display='block';
    clearTimeout(hintTimer);
    hintTimer=setTimeout(()=>{h.style.display='none';}, ms || 3200);
  }
  function updateBtn(needsTap){
    const b=d.getElementById('v4FullReturnBtn');
    if(!b) return;
    const isFull=!!fullEl();
    b.textContent = isFull ? 'FULL中' : 'FULL復帰';
    b.classList.toggle('full', isFull);
    b.classList.toggle('needTap', !!needsTap && !isFull);
  }
  function goFull(ev){
    if(ev){
      ev.preventDefault();
      ev.stopPropagation();
      if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    }
    try{
      const p=requestFs(d.documentElement);
      if(p && p.then){
        p.then(()=>{setOverlayHidden(); relayoutAll(); updateBtn(false);})
         .catch(()=>{showHint('全画面に戻れない時は、このHTMLをChromeで開いてFULL復帰をタップ'); updateBtn(true);});
      }else{
        setTimeout(()=>{ if(fullEl()) setOverlayHidden(); relayoutAll(); updateBtn(!fullEl()); },180);
      }
    }catch(e){
      showHint('もう一度「FULL復帰」をタップしてね');
      updateBtn(true);
    }
  }
  function install(){
    let b=d.getElementById('v4FullReturnBtn');

      b=d.createElement('button');
      b.id='v4FullReturnBtn';

    let h=d.getElementById('v4FullHint');
    if(!h){
      h=d.createElement('div');
      h.id='v4FullHint';
      d.body.appendChild(h);
    }

    ['pointerdown','touchstart','click'].forEach(ev=>{
      b.addEventListener(ev, goFull, {capture:true, passive:false});
    });

    // 本体内のFULLボタンも同じ処理に統一
    ['fs','v3FsBtn'].forEach(id=>{
      const el=d.getElementById(id);
      if(!el) return;
      ['pointerdown','touchstart','click'].forEach(ev=>{
        el.addEventListener(ev, goFull, {capture:true, passive:false});
      });
    });

    // GPS許可ポップアップ後に全画面が解除されやすいので、復帰ボタンを光らせる
    const gps=d.getElementById('gps');
    if(gps){
      ['pointerdown','touchstart','click'].forEach(ev=>{
        gps.addEventListener(ev, ()=>{
          lastGpsTap=Date.now();

            relayoutAll();
            if(!fullEl()){

            }
          },900);
        }, {capture:true, passive:true});
      });

    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(ev=>{
      d.addEventListener(ev, ()=>{
        if(fullEl()) setOverlayHidden();
        relayoutAll();
        updateBtn(false);
      });
    });
    ['resize','orientationchange','pageshow','focus','visibilitychange'].forEach(ev=>{
      window.addEventListener(ev, ()=>{
        setTimeout(()=>{
          relayoutAll();
          if(!fullEl() && Date.now()-lastGpsTap < 12000){
            updateBtn(true);
          }else{
            updateBtn(false);
          }
        },160);
      }, {passive:true});
    });

    setTimeout(()=>{ relayoutAll(); updateBtn(false); },150);
    setTimeout(()=>{ relayoutAll(); updateBtn(false); },700);
  }

  if(d.readyState==='loading') d.addEventListener('DOMContentLoaded',install);
  else install();
})();
</script>

<script id="v5AutoHideControlsScript">
(function(){
  'use strict';
  const d=document;
  let timer=null;
  const WAIT=2600;

  function isFull(){
    return !!(d.fullscreenElement||d.webkitFullscreenElement||d.mozFullScreenElement||d.msFullscreenElement);
  }
  function isPanelOpen(){
    const p=d.getElementById('hudPanel')||d.getElementById('v3Panel');
    if(!p) return false;
    const cs=getComputedStyle(p);
    return cs.display!=='none' && cs.visibility!=='hidden' && Number(cs.opacity||1)>0.05 && (p.classList.contains('open') || p.classList.contains('show') || cs.pointerEvents!=='none');
  }
  function hideNow(){
    if(isPanelOpen()) return;
    d.body.classList.add('hudControlsHidden');
    d.body.classList.remove('hudMenuOpen');
  }
  function showNow(){
    d.body.classList.remove('hudControlsHidden');
    clearTimeout(timer);
    timer=setTimeout(hideNow, WAIT);
  }
  function forceHideOverlay(){
    if(isFull()){
      const o=d.getElementById('v32StartOverlay');
      if(o) o.classList.add('hide');
    }
  }
  function watchMenu(){
    const menu=d.getElementById('hudMenuBtn');
    const panels=[d.getElementById('hudPanel'),d.getElementById('v3Panel')].filter(Boolean);
    if(menu){
      menu.addEventListener('pointerdown',()=>{d.body.classList.add('hudMenuOpen');showNow();},{passive:true});
      menu.addEventListener('click',()=>{setTimeout(()=>{ if(isPanelOpen()) d.body.classList.add('hudMenuOpen'); else d.body.classList.remove('hudMenuOpen'); showNow();},80);},{passive:true});
    }
    panels.forEach(p=>{
      p.addEventListener('pointerdown',()=>{d.body.classList.add('hudMenuOpen');showNow();},{passive:true});
      p.addEventListener('click',()=>{d.body.classList.add('hudMenuOpen');showNow();},{passive:true});
    });
  }
  function install(){
    showNow();
    watchMenu();
    ['pointerdown','touchstart','mousemove','keydown'].forEach(ev=>{
      d.addEventListener(ev, function(e){
        const t=e.target;
        if(t && (t.id==='v32StartOverlay' || (t.closest && t.closest('#v32StartOverlay')))) return;
        showNow();
      }, {capture:true, passive:true});
    });
    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange','resize','orientationchange','pageshow','focus'].forEach(ev=>{
      window.addEventListener(ev,()=>{setTimeout(()=>{forceHideOverlay();showNow();},120);},{passive:true});
      d.addEventListener(ev,()=>{setTimeout(()=>{forceHideOverlay();showNow();},120);},{passive:true});
    });
    setTimeout(forceHideOverlay,500);
    setTimeout(hideNow,3600);
  }
  if(d.readyState==='loading') d.addEventListener('DOMContentLoaded',install); else install();
})();
</script>

<script id="v6NoFullscreenButtonsScript">
(function(){
  'use strict';
  const d=document;
  function removeFullUi(){
    ['fs','v3FsBtn','v31FsForceBtn','v32FsBtn','v4FullReturnBtn','v4FullHint','v32StartOverlay','v32StartCard'].forEach(id=>{
      const el=d.getElementById(id);
      if(el) el.remove();
    });
  }
  function requestFull(){
    const el=d.documentElement;
    try{
      const p=(el.requestFullscreen&&el.requestFullscreen({navigationUI:'hide'})) ||
              (el.webkitRequestFullscreen&&el.webkitRequestFullscreen()) ||
              (el.mozRequestFullScreen&&el.mozRequestFullScreen()) ||
              (el.msRequestFullscreen&&el.msRequestFullscreen());
      if(p&&p.catch) p.catch(()=>{});
    }catch(e){}
    try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){}
  }
  let taps=0, tapTimer=null;
  d.addEventListener('click', function(e){
    if(e.target && e.target.closest && e.target.closest('button,input,select,textarea,#v3Panel,#hudPanel')) return;
    taps++;
    clearTimeout(tapTimer);
    tapTimer=setTimeout(()=>{taps=0;},360);
    if(taps>=2){
      taps=0;
      requestFull();
    }
  }, {capture:false, passive:true});
  ['DOMContentLoaded','pageshow','resize','orientationchange','fullscreenchange','webkitfullscreenchange'].forEach(ev=>{
    d.addEventListener(ev,()=>setTimeout(removeFullUi,50),{passive:true});
    window.addEventListener(ev,()=>setTimeout(removeFullUi,50),{passive:true});
  });
  removeFullUi();
  setTimeout(removeFullUi,300);
  setTimeout(removeFullUi,1000);
})();
</script>

<script id="v7AllFixedScript">
(function(){
  'use strict';
  const d=document, root=d.documentElement;
  const $=id=>d.getElementById(id);
  const isImg=v=>typeof v==='string' && v.startsWith('data:image/');
  const css=v=>isImg(v)?'url("'+v+'")':v;
  const get=(k,def)=>{try{return localStorage.getItem(k) ?? def;}catch(e){return def;}};
  const set=(k,v)=>{try{localStorage.setItem(k,String(v));}catch(e){}};
  const del=k=>{try{localStorage.removeItem(k);}catch(e){}};

  function killFullUi(){
    ['fs','v3FsBtn','v31FsForceBtn','v32FsBtn','v4FullReturnBtn','v4FullHint','v32StartOverlay','v32StartCard'].forEach(id=>{const el=$(id); if(el) el.remove();});
  }
  function applyLogoOpacity(){
    const v=Math.max(15,Math.min(100,Number(get('hudLogoOpacity','82'))||82));
    root.style.setProperty('--hud-logo-opacity',(v/100).toFixed(2));
    const r=$('logoOpacityRange'), o=$('logoOpacityVal');
    if(r) r.value=String(v); if(o) o.textContent=v+'%';
  }
  function applyBackgroundHard(){
    const bg=get('hudCustomBg','') || sessionStorage.getItem('hudLockedImageBg') || '';
    if(!bg) return;
    if(isImg(bg)) { set('hudCustomBg',bg); try{sessionStorage.setItem('hudLockedImageBg',bg);}catch(e){} }
    d.body.classList.add('customBg');
    root.style.setProperty('--hud-custom-bg',css(bg));
    const x=get('hudBgX','50'), y=get('hudBgY','50');
    root.style.setProperty('--hud-bg-x',x+'%'); root.style.setProperty('--hud-bg-y',y+'%');
    const size=get('hudBgFit','cover')==='contain' ? 'contain' : (get('hudBgZoom','100')==='100' ? 'cover' : get('hudBgZoom','100')+'% auto');
    root.style.setProperty('--hud-bg-size',size);
    d.body.style.setProperty('background-image',css(bg),'important');
    d.body.style.setProperty('background-size',size,'important');
    d.body.style.setProperty('background-position',x+'% '+y+'%','important');
    d.body.style.setProperty('background-repeat','no-repeat','important');
  }
  function installLogoOpacityControl(){
    const grid=$('hudPanel') && $('hudPanel').querySelector('.hudGrid');
    if(!grid || $('logoOpacityRange')) return;
    grid.insertAdjacentHTML('beforeend','<div class="hudSectionTitle">LOGO</div><label class="hudRange smallText"><span>ロゴ透過率</span><input id="logoOpacityRange" type="range" min="15" max="100" step="5"><b id="logoOpacityVal"></b></label><button id="logoOpacitySoftBtn">薄め</button><button id="logoOpacitySolidBtn">濃いめ</button>');
    $('logoOpacityRange').addEventListener('input',e=>{set('hudLogoOpacity',e.target.value);applyLogoOpacity();});
    $('logoOpacitySoftBtn').onclick=()=>{set('hudLogoOpacity','62');applyLogoOpacity();};
    $('logoOpacitySolidBtn').onclick=()=>{set('hudLogoOpacity','88');applyLogoOpacity();};
    applyLogoOpacity();
  }
  function patchPresetButtons(){
    const keys=['hudCustomBg','hudCustomLogo','hudTheme','hudBgFit','hudBgX','hudBgY','hudBgZoom','hudBgBlurOn','hudBgBlur','hudBgDim','hudGlowColor','hudSpeedColor','hudLogoScale','hudLogoX','hudLogoY','hudLogoGlow','hudLogoMode','hudLogoOpacity','hudGlowMode','hudHideClock','hudHideDate','hudHideGps','hudHideDist','hudHideBatteryFrame','hudHidePanels','hudPanelAlpha'];
    const save=$('savePresetBtn'), load=$('loadPresetBtn');
    if(save && save.dataset.v7!=='1'){
      save.dataset.v7='1'; save.onclick=null;
      save.addEventListener('click',()=>{
        const o={}; keys.forEach(k=>{const v=get(k,null); if(v!==null)o[k]=v;});
        try{localStorage.setItem('hudSavedPreset1',JSON.stringify(o));save.textContent='保存した';}
        catch(e){const bg=o.hudCustomBg; delete o.hudCustomBg; try{localStorage.setItem('hudSavedPreset1',JSON.stringify(o)); if(bg) set('hudCustomBg',bg); save.textContent='画像以外保存';}catch(_e){save.textContent='保存失敗';}}
        setTimeout(()=>save.textContent='今の設定を保存',1100);
      },true);
    }
    if(load && load.dataset.v7!=='1'){
      load.dataset.v7='1'; load.onclick=null;
      load.addEventListener('click',()=>{
        const currentBg=get('hudCustomBg',''), currentLogo=get('hudCustomLogo','');
        try{
          const o=JSON.parse(get('hudSavedPreset1','{}')||'{}');
          Object.entries(o).forEach(([k,v])=>set(k,v));
          if(!isImg(o.hudCustomBg) && isImg(currentBg)) set('hudCustomBg',currentBg);
          if(!o.hudCustomLogo && currentLogo) set('hudCustomLogo',currentLogo);
          applyLogoOpacity(); applyBackgroundHard();
          load.textContent='呼出した'; setTimeout(()=>location.reload(),260);
        }catch(e){load.textContent='呼出エラー'; setTimeout(()=>load.textContent='保存設定を呼出',1200);}
      },true);
    }
  }
  function installControlPeek(){
    let t=null;
    function panelOpen(){const p=$('hudPanel'); return !!(p && p.classList.contains('open'));}
    function show(){d.body.classList.add('hudShowControls'); clearTimeout(t); t=setTimeout(()=>{if(!panelOpen())d.body.classList.remove('hudShowControls');},2400);}
    d.addEventListener('pointerdown',e=>{ if(e.target && e.target.closest && e.target.closest('#hudPanel')) return; show(); },{passive:true});
    const menu=$('hudMenuBtn');
    if(menu){
      menu.addEventListener('click',()=>setTimeout(()=>{d.body.classList.toggle('hudMenuOpen',panelOpen()); show(); installLogoOpacityControl(); patchPresetButtons();},60),{passive:true});
    }
    show(); setTimeout(()=>{if(!panelOpen())d.body.classList.remove('hudShowControls');},3300);
  }
  function init(){
    killFullUi(); applyLogoOpacity(); applyBackgroundHard(); installLogoOpacityControl(); patchPresetButtons(); installControlPeek();
    ['DOMContentLoaded','load','pageshow','resize','orientationchange','fullscreenchange','visibilitychange'].forEach(ev=>{window.addEventListener(ev,()=>setTimeout(()=>{killFullUi();applyLogoOpacity();applyBackgroundHard();},50),{passive:true});d.addEventListener(ev,()=>setTimeout(()=>{killFullUi();applyLogoOpacity();applyBackgroundHard();},50),{passive:true});});
  }
  if(d.readyState==='loading') d.addEventListener('DOMContentLoaded',init); else init();
})();
</script>

<script id="v8GpsFullscreenFixScript">
(function(){
  'use strict';
  const d=document;
  let gpsTouchedAt=0;
  let suppressOverlayUntil=0;

  function fullEl(){
    return d.fullscreenElement||d.webkitFullscreenElement||d.mozFullScreenElement||d.msFullscreenElement;
  }
  function relayout(){
    try{window.dispatchEvent(new Event('resize'));}catch(e){}
    try{if(typeof window.relayoutMany==='function')window.relayoutMany();}catch(e){}
    try{if(typeof window.applyV3Bg==='function')window.applyV3Bg();}catch(e){}
    try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});}catch(e){}
  }
  function reqFull(){
    const el=d.documentElement;
    try{
      const p=(el.requestFullscreen&&el.requestFullscreen())||
              (el.webkitRequestFullscreen&&el.webkitRequestFullscreen())||
              (el.mozRequestFullScreen&&el.mozRequestFullScreen())||
              (el.msRequestFullscreen&&el.msRequestFullscreen());
      if(p&&p.then){
        p.then(()=>{hideRestore();relayout();}).catch(()=>{showRestore(true);});
      }else{
        setTimeout(()=>{if(fullEl())hideRestore();else showRestore(true);relayout();},180);
      }
    }catch(e){showRestore(true);}
  }
  function hideRestore(){
    const o=d.getElementById('v8FullTapOverlay');
    const b=d.getElementById('v8FullReturnMini');
    if(o)o.classList.remove('show');
    if(b)b.classList.remove('show');
  }
  function showRestore(overlay){
    if(fullEl()){hideRestore();return;}
    if(Date.now()<suppressOverlayUntil)return;
    const o=d.getElementById('v8FullTapOverlay');
    const b=d.getElementById('v8FullReturnMini');
    if(b)b.classList.add('show');
    if(overlay&&o)o.classList.add('show');
  }
  function checkAfterGps(){
    setTimeout(()=>{relayout(); if(!fullEl()) showRestore(true);},700);
    setTimeout(()=>{relayout(); if(!fullEl()) showRestore(true);},1600);
    setTimeout(()=>{relayout(); if(!fullEl()) showRestore(false);},3200);
  }
  function install(){
    if(!d.getElementById('v8FullTapOverlay')){
      const o=d.createElement('div');
      o.id='v8FullTapOverlay';
      o.innerHTML='<div id="v8FullTapCard"><b>TAP FULL</b><span>GPS許可で全画面が外れました。<br>ここをタップで全画面に戻ります。</span></div>';
      d.body.appendChild(o);
      ['pointerdown','touchstart','click'].forEach(ev=>o.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();reqFull();},{capture:true,passive:false}));
    }
    if(!d.getElementById('v8FullReturnMini')){
      const b=d.createElement('button');
      b.id='v8FullReturnMini';
      b.type='button';
      b.textContent='FULL復帰';
      d.body.appendChild(b);
      ['pointerdown','touchstart','click'].forEach(ev=>b.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();reqFull();},{capture:true,passive:false}));
    }

    const gps=d.getElementById('gps');
    if(gps && gps.dataset.v8fs!=='1'){
      gps.dataset.v8fs='1';
      // GPSボタンを押した瞬間のユーザー操作で、先に全画面を要求する。
      ['pointerdown','touchstart','click'].forEach(ev=>gps.addEventListener(ev,function(){
        gpsTouchedAt=Date.now();
        if(!fullEl()) reqFull();
        checkAfterGps();
      },{capture:true,passive:true}));
    }

    // 画面の空白を長押し/ダブルタップ気味に触った時も復帰できる保険。
    let lastTap=0;
    d.addEventListener('pointerdown',function(e){
      const t=e.target;
      if(t && t.closest && t.closest('button,input,select,textarea,#hudPanel,#v3Panel,#v8FullTapOverlay'))return;
      const now=Date.now();
      if(!fullEl() && now-lastTap<520){reqFull();}
      lastTap=now;
    },{capture:false,passive:true});

    ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(ev=>d.addEventListener(ev,()=>{if(fullEl())hideRestore();relayout();},{passive:true}));
    ['pageshow','focus','visibilitychange','resize','orientationchange'].forEach(ev=>window.addEventListener(ev,()=>{
      setTimeout(()=>{
        relayout();
        if(fullEl())hideRestore();
        else if(Date.now()-gpsTouchedAt<15000)showRestore(true);
      },220);
    },{passive:true}));

    setTimeout(()=>{if(fullEl())hideRestore();},500);
  }
  if(d.readyState==='loading')d.addEventListener('DOMContentLoaded',install);else install();
})();
</script>


<script>
(function(){
  const APP_VERSION='lb-hud-v9-pwa';
  function hideSplash(){
    const s=document.getElementById('lbSplash');
    if(!s)return;
    s.classList.add('hide');
    setTimeout(()=>{try{s.remove();}catch(e){}},900);
  }
  window.addEventListener('load',()=>setTimeout(hideSplash,1250),{once:true});
  setTimeout(hideSplash,2600);

  async function registerPwa(){
    if(!('serviceWorker' in navigator))return;
    try{
      const reg=await navigator.serviceWorker.register('./service-worker.js',{scope:'./'});
      if(reg&&reg.update)reg.update().catch(()=>{});
    }catch(e){console.warn('PWA cache register failed',e);}
  }
  registerPwa();

  let v9WakeLock=null;
  async function requestWakeLock(){
    try{
      if('wakeLock' in navigator){
        v9WakeLock=await navigator.wakeLock.request('screen');
        v9WakeLock.addEventListener&&v9WakeLock.addEventListener('release',()=>{});
      }
    }catch(e){}
  }
  ['pointerdown','touchstart','click'].forEach(ev=>document.addEventListener(ev,requestWakeLock,{once:true,passive:true}));
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock();},{passive:true});

  function nudgeFull(){
    const el=document.documentElement;
    if(document.fullscreenElement||document.webkitFullscreenElement)return;
    const fn=el.requestFullscreen||el.webkitRequestFullscreen;
    if(fn){try{fn.call(el).catch&&fn.call(el).catch(()=>{});}catch(e){}}
  }
  const gps=document.getElementById('gps'), fs=document.getElementById('fs');
  [gps,fs].forEach(btn=>{
    if(!btn)return;
    ['pointerdown','touchstart','click'].forEach(ev=>btn.addEventListener(ev,()=>{requestWakeLock();setTimeout(nudgeFull,60);setTimeout(nudgeFull,850);},{capture:true,passive:true}));
  });
})();
</script>
